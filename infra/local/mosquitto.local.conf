# Local-development Mosquitto: plain TCP, anonymous, no go-auth, no TLS.
#
# This is for iterating on the agent + a real Home Assistant on your machine.
# It skips the cloud broker-auth entirely (allow_anonymous), so the agent's MQTT
# username/password are ignored — you can point the agent here with pre-seeded
# or throwaway credentials and watch the topics with mosquitto_sub/pub.
#
# DO NOT use this config anywhere reachable from the internet.

listener 1883 0.0.0.0
allow_anonymous true

persistence false
log_dest stdout
log_type error
log_type warning
log_type notice
